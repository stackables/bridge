name: Code Coverage

on:
    push:
        branches:
            - main

permissions:
    id-token: write

jobs:
    release:
        name: Coverage
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
            - name: Setup pnpm
              uses: pnpm/action-setup@v4

            - name: Setup node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "24"
                  cache: "pnpm"
            - name: Install dependencies
              run: pnpm install
            - name: Run the tests
              run: pnpm test:coverage
            - name: Upload coverage to Codecov
              uses: codecov/codecov-action@v5
              with:
                  use_oidc: true
