name: Test

permissions:
  contents: read

on:
  pull_request:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
      - uses: pnpm/action-setup@v4
      - name: Install dependencies
        run: pnpm install
      - name: Test
        run: pnpm test
      - name: Fuzz
        run: pnpm fuzz
      - name: Build
        run: pnpm build
      - name: Lint with ESLint
        run: pnpm lint
