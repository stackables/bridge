# Static JSON file server — simulates an external REST API.

server {
    listen 8080 default_server;
    listen [::]:8080;
    server_name _;
    access_log off;

    default_type application/json;
    add_header Cache-Control "no-store";

    # Serve pre-generated fixtures from /data
    location = /api/simple  { alias /data/simple.json; }
    location = /api/list    { alias /data/list.json; }
    location = /api/catalog { alias /data/catalog.json; }

    # /api/variant/1 … /api/variant/10
    location ~ ^/api/variant/(\d+)$ { alias /data/variant-$1.json; }

    location = /health { return 200 '{"status":"ok"}'; }
}
