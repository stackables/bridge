# Bridge load-test stack — each service has its own image.
#
# Usage:
#   docker compose up -d --build          # start all services
#   docker compose run --rm k6            # run k6 load test
#   docker compose down                   # tear down

services:
  dependency:
    build: ./dependency
    ports: ["9080:8080"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 2s
      timeout: 2s
      retries: 5

  bridge-standalone:
    build: ./bridge-standalone
    ports: ["3001:3000"]
    depends_on:
      dependency: { condition: service_healthy }
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://localhost:3000/health'').then(r=>{if(!r.ok)throw r.status})"',
        ]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 5s

  handcoded:
    build: ./handcoded
    ports: ["3002:3000"]
    environment:
      DEPENDENCY_URL: http://dependency:8080
    depends_on:
      dependency: { condition: service_healthy }
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://localhost:3000/health'').then(r=>{if(!r.ok)throw r.status})"',
        ]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 5s

  bridge-graphql:
    build: ./bridge-graphql
    ports: ["3003:3000"]
    depends_on:
      dependency: { condition: service_healthy }
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://localhost:3000/health'').then(r=>{if(!r.ok)throw r.status})"',
        ]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 5s

  k6:
    image: grafana/k6:latest
    volumes:
      - ./k6:/scripts:ro
      - ./results:/results
    environment:
      PROFILE: "${PROFILE:-full}"
      VUS: "${VUS:-20}"
      DURATION: "${DURATION:-30s}"
      STAGE_DURATION: "${STAGE_DURATION:-30s}"
    depends_on:
      bridge-standalone: { condition: service_healthy }
      handcoded: { condition: service_healthy }
      bridge-graphql: { condition: service_healthy }
    profiles: [test]
    entrypoint:
      ["k6", "run", "--out", "json=/results/raw.json", "/scripts/test.js"]
